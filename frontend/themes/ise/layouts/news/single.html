{{ define "main" }}
  {{ partial "breadcrumb.html" . }}
  <div class="page-shell container">
    <article class="page-main article">
      <h1>{{ .Title }}</h1>
      <time class="article__date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
      {{ partial "page-image.html" . }}
      <div class="article__body">{{ .Content }}</div>
    </article>
  </div>
{{ end }}
