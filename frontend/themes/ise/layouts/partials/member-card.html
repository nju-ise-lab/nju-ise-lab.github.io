<article class="member-card">
  {{ $avatar := .Resources.GetMatch (.Params.avatar | default "") }}
  <a class="member-card__avatar" href="{{ .RelPermalink }}" aria-label="{{ .Title }}">
    {{ with $avatar }}
      <img src="{{ .RelPermalink }}" alt="{{ $.Title }}">
    {{ else }}
      <span>{{ substr .Title 0 1 }}</span>
    {{ end }}
  </a>
  <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
  {{ with .Params.role_title }}<p class="member-card__role">{{ . }}</p>{{ end }}
</article>
