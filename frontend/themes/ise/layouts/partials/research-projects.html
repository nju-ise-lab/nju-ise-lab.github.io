{{ $platformPages := default (where site.RegularPages "Section" "platform") .platformPages }}
{{ $outputs := default (slice) hugo.Data.projects }}

<section class="research-project-block" aria-labelledby="research-project-platforms">
  <h2 id="research-project-platforms" class="page-subtitle">项目</h2>
  <div class="research-project-list research-project-list--platforms project-card-list">
    {{ partial "section-list.html" (dict "pages" $platformPages) }}
  </div>
</section>

<section class="research-project-block" aria-labelledby="research-project-outputs">
  <h2 id="research-project-outputs" class="page-subtitle">专利 / 产出</h2>
  <div class="research-project-list research-project-list--outputs related-card-list">
    {{ partial "patent-list.html" (dict "patents" $outputs) }}
  </div>
</section>
