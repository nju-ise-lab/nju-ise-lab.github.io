{{ $authors := default (slice) . }}
<span class="author-list">
  {{- range $index, $author := $authors -}}
    {{- if gt $index 0 }}、{{ end -}}
    {{- with $author.member_url -}}
      <a class="author-list__link" href="{{ . }}">{{ $author.name }}</a>
    {{- else -}}
      <span>{{ $author.name }}</span>
    {{- end -}}
  {{- end -}}
</span>
