{{ if not .IsHome }}
  <nav class="breadcrumb container" aria-label="面包屑导航">
    <a href="/">首页</a>
    {{ range .Ancestors.Reverse }}
      {{ if not .IsHome }}
        <span>/</span>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      {{ end }}
    {{ end }}
    <span>/</span>
    <span aria-current="page">{{ .Title }}</span>
  </nav>
{{ end }}
